<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music School - Prototype</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f9fafb; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const MusicSchoolPrototype = () => {
      const [activeScreen, setActiveScreen] = useState('student-dashboard');
      const [userType, setUserType] = useState('student');
      const [chatOpen, setChatOpen] = useState(true);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [menuOpen, setMenuOpen] = useState(false);

      // Helper to switch user context
      const switchTo = (screen, type) => {
        setActiveScreen(screen);
        setUserType(type);
      };

      const navConfig = {
        teacher: [
          { label: 'Dashboard', icon: '🏠', screen: 'teacher-dashboard' },
          { label: 'Schedule', icon: '📅', screen: 'schedule' },
          { label: 'Students', icon: '👥', screen: 'students-roster' },
          { label: 'Bands', icon: '🎷', screen: 'band-management' },
          { label: 'Messages', icon: '💬', screen: 'messaging' },
        ],
        student: [
          { label: 'Home', icon: '🏠', screen: 'student-dashboard' },
          { label: 'Schedule', icon: '📅', screen: 'book-lesson' },
          { label: 'Messages', icon: '💬', screen: 'messaging' },
        ],
        parent: [
          { label: 'Home', icon: '🏠', screen: 'parent-dashboard' },
          { label: 'Schedule', icon: '📅', screen: 'book-lesson' },
          { label: 'Messages', icon: '💬', screen: 'messaging' },
          { label: 'Billing', icon: '💳', screen: 'billing' },
        ],
        admin: [
          { label: 'Overview', icon: '🏠', screen: 'admin-dashboard' },
          { label: 'Teachers', icon: '👩‍🏫', screen: 'admin-dashboard' },
          { label: 'Students', icon: '👥', screen: 'admin-dashboard' },
          { label: 'Reports', icon: '📊', screen: 'admin-reports' },
          { label: 'Messages', icon: '💬', screen: 'messaging' },
        ],
      };

      const userNames = {
        teacher: { name: 'Greg', role: 'Teacher' },
        student: { name: 'Henry', role: 'Student' },
        parent: { name: 'Keith Barney', role: 'Parent' },
        admin: { name: 'Phil', role: 'Admin' },
      };

      // Mobile Bottom Navigation
      const MobileMenu = () => {
        const items = navConfig[userType] || navConfig.student;
        const user = userNames[userType];
        return (
          <>
            <div
              className={`md:hidden fixed inset-0 bg-black z-40 transition-opacity duration-300 ease-out ${menuOpen ? 'opacity-20' : 'opacity-0 pointer-events-none'}`}
              onClick={() => setMenuOpen(false)}
            />
            <div className={`md:hidden fixed top-0 left-0 bottom-0 w-64 bg-white z-50 flex flex-col shadow-xl transition-transform duration-300 ease-out ${menuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
              <div className="flex items-center justify-between p-4 border-b border-gray-200">
                <div className="text-lg font-bold text-gray-900">🎵 Music School</div>
                <button onClick={() => setMenuOpen(false)} className="text-2xl text-gray-500">×</button>
              </div>
              <nav className="flex-1 p-4 space-y-1">
                {items.map((item) => (
                  <div
                    key={item.label}
                    onClick={() => { setActiveScreen(item.screen); setMenuOpen(false); }}
                    className={`px-3 py-3 rounded-lg cursor-pointer flex items-center gap-3 ${
                      activeScreen === item.screen ? 'bg-gray-900 text-white' : 'text-gray-600 hover:bg-gray-100'
                    }`}
                  >
                    <span className="text-xl">{item.icon}</span> {item.label}
                  </div>
                ))}
                <div
                  onClick={() => { setActiveScreen('notifications'); setMenuOpen(false); }}
                  className="px-3 py-3 rounded-lg cursor-pointer flex items-center justify-between text-gray-600 hover:bg-gray-100"
                >
                  <span className="flex items-center gap-3"><span className="text-xl">🔔</span> Notifications</span>
                  <span className="bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">3</span>
                </div>
              </nav>
              <div className="p-4 border-t border-gray-200">
                <div className="text-xs text-gray-400 mb-2">Switch view:</div>
                <div className="flex gap-2 flex-wrap">
                  {['teacher', 'student', 'parent', 'admin'].map(type => (
                    <button
                      key={type}
                      onClick={() => { switchTo(type === 'teacher' ? 'teacher-dashboard' : type === 'student' ? 'student-dashboard' : type === 'parent' ? 'parent-dashboard' : 'admin-dashboard', type); setMenuOpen(false); }}
                      className={`px-3 py-2 rounded text-sm ${userType === type ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-600'}`}
                    >
                      {type.charAt(0).toUpperCase() + type.slice(1)}
                    </button>
                  ))}
                </div>
              </div>
              <div className="p-4 border-t border-gray-200">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full bg-gray-300" />
                  <div>
                    <div className="font-medium text-gray-900">{user.name}</div>
                    <div className="text-sm text-gray-500">{user.role}</div>
                  </div>
                </div>
              </div>
            </div>
          </>
        );
      };

      const Sidebar = () => {
        const items = navConfig[userType] || navConfig.student;
        const user = userNames[userType];

        return (
          <div className="hidden md:flex w-48 bg-gray-50 border-r border-gray-200 p-4 flex-col">
            <div className="text-lg font-bold text-gray-900 mb-6">🎵 Music School</div>
            <nav className="space-y-1 flex-1">
              {items.map((item, i) => (
                <div
                  key={item.label}
                  onClick={() => setActiveScreen(item.screen)}
                  className={`px-3 py-2 rounded-lg cursor-pointer flex items-center gap-2 text-sm ${
                    i === 0 ? 'bg-gray-900 text-white' : 'text-gray-600 hover:bg-gray-200'
                  }`}
                >
                  <span>{item.icon}</span> {item.label}
                </div>
              ))}
              <div
                onClick={() => setActiveScreen('notifications')}
                className="px-3 py-2 rounded-lg cursor-pointer flex items-center justify-between text-sm text-gray-600 hover:bg-gray-200"
              >
                <span>🔔 Notifications</span>
                <span className="bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">3</span>
              </div>
            </nav>

            {/* User Switcher */}
            <div className="pt-4 border-t border-gray-200 mt-4">
              <div className="text-xs text-gray-400 mb-2">Switch view:</div>
              <div className="flex gap-1 flex-wrap">
                {['teacher', 'student', 'parent', 'admin'].map(type => (
                  <button
                    key={type}
                    onClick={() => switchTo(type === 'teacher' ? 'teacher-dashboard' : type === 'student' ? 'student-dashboard' : type === 'parent' ? 'parent-dashboard' : 'admin-dashboard', type)}
                    className={`px-2 py-1 rounded text-xs ${userType === type ? 'bg-gray-900 text-white' : 'bg-gray-200 text-gray-600'}`}
                  >
                    {type.charAt(0).toUpperCase() + type.slice(1)}
                  </button>
                ))}
              </div>
            </div>

            <div className="pt-4 border-t border-gray-200 mt-4">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-full bg-gray-300" />
                <div>
                  <div className="font-medium text-gray-900 text-sm">{user.name}</div>
                  <div className="text-xs text-gray-500">{user.role}</div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const ChatWindow = ({ recipient, subtitle }) => (
        chatOpen && (
          <div className="absolute bottom-0 right-0 w-72 bg-white border border-gray-200 rounded-t-xl shadow-xl">
            <div className="flex items-center justify-between p-3 bg-gray-900 text-white rounded-t-xl">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 rounded-full bg-gray-500" />
                <div>
                  <div className="text-sm font-medium">{recipient}</div>
                  {subtitle && <div className="text-xs text-gray-400">{subtitle}</div>}
                </div>
              </div>
              <button onClick={() => setChatOpen(false)} className="text-gray-400 hover:text-white text-xl">−</button>
            </div>
            <div className="h-40 p-3 space-y-3 overflow-auto bg-gray-50">
              <div className="flex justify-start">
                <div className="bg-white border border-gray-200 rounded-xl px-3 py-2 text-sm max-w-[80%] shadow-sm">
                  Great job on the scales! Keep practicing. 🎵
                </div>
              </div>
              <div className="flex justify-end">
                <div className="bg-gray-900 text-white rounded-xl px-3 py-2 text-sm max-w-[80%]">
                  Thanks so much! 🎹
                </div>
              </div>
            </div>
            <div className="p-3 border-t border-gray-200">
              <div className="flex gap-2">
                <input type="text" placeholder="Type a message..." className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gray-400" />
                <button className="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium">Send</button>
              </div>
            </div>
          </div>
        )
      );

      const calendarEvents = {
        3: { type: 'lesson', title: 'Drums Lesson', time: '4:00 PM', with: 'Greg', location: 'Studio A', notes: 'Focus on rock beat timing' },
        6: { type: 'rehearsal', title: 'Band Rehearsal', time: '5:00 PM', location: 'Main Hall', notes: 'Bring drumsticks, working on new song' },
        10: { type: 'lesson', title: 'Drums Lesson', time: '4:00 PM', with: 'Greg', location: 'Studio A', notes: 'Review single stroke roll' },
        13: { type: 'rehearsal', title: 'Band Rehearsal', time: '5:00 PM', location: 'Main Hall', notes: 'Final practice before showcase' },
      };

      const EventSheet = ({ event, onClose }) => (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-md mx-4 overflow-hidden" onClick={e => e.stopPropagation()}>
            <div className={`p-4 ${event.type === 'rehearsal' ? 'bg-orange-500' : 'bg-blue-500'} text-white`}>
              <div className="flex justify-between items-start">
                <div>
                  <div className="text-sm opacity-80">{event.type === 'rehearsal' ? 'Rehearsal' : 'Lesson'}</div>
                  <h2 className="text-xl font-bold">{event.title}</h2>
                </div>
                <button onClick={onClose} className="text-white opacity-80 hover:opacity-100 text-2xl">×</button>
              </div>
            </div>
            <div className="p-4 space-y-4">
              <div className="flex items-center gap-3">
                <span className="text-gray-400">🕐</span>
                <div>
                  <div className="font-medium">Time</div>
                  <div className="text-gray-600">{event.time}</div>
                </div>
              </div>
              {event.with && (
                <div className="flex items-center gap-3">
                  <span className="text-gray-400">👤</span>
                  <div>
                    <div className="font-medium">Teacher</div>
                    <div className="text-gray-600">{event.with}</div>
                  </div>
                </div>
              )}
              <div className="flex items-center gap-3">
                <span className="text-gray-400">📍</span>
                <div>
                  <div className="font-medium">Location</div>
                  <div className="text-gray-600">{event.location}</div>
                </div>
              </div>
              {event.notes && (
                <div className="flex items-start gap-3">
                  <span className="text-gray-400">📝</span>
                  <div>
                    <div className="font-medium">Notes</div>
                    <div className="text-gray-600">{event.notes}</div>
                  </div>
                </div>
              )}
              <div className="flex gap-2 pt-2">
                <button className="flex-1 bg-gray-900 text-white py-3 rounded-xl font-medium">Reschedule</button>
                <button className="flex-1 border border-gray-200 py-3 rounded-xl text-gray-600">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      );

      const Calendar = ({ showRehearsals = true }) => {
        const handleDayClick = (day, hasLesson, hasRehearsal) => {
          if (hasLesson || (hasRehearsal && showRehearsals)) {
            setSelectedEvent({ ...calendarEvents[day], day });
          }
        };

        return (
          <div className="mb-6">
            <div className="flex items-center justify-between mb-3">
              <h2 className="font-bold text-gray-900">February 2026</h2>
              <div className="flex gap-2">
                <button className="text-gray-400 hover:text-gray-600 px-2">←</button>
                <button className="text-gray-400 hover:text-gray-600 px-2">→</button>
              </div>
            </div>
            <div className="border border-gray-200 rounded-xl overflow-hidden">
              <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((d, i) => (
                  <div key={i} className="p-1 md:p-2 text-xs text-gray-500 text-center font-medium">{d}</div>
                ))}
              </div>
              <div className="grid grid-cols-7 text-xs md:text-sm">
                {[26, 27, 28, 29, 30, 31, 1].map((d, i) => (
                  <div key={i} className={`p-1 md:p-2 text-center border-b border-r border-gray-100 min-h-[40px] md:min-h-[60px] ${d > 25 ? 'text-gray-300' : ''}`}>
                    {d}
                  </div>
                ))}
                {[2, 3, 4, 5, 6, 7, 8].map((d, i) => {
                  const hasLesson = d === 3;
                  const hasRehearsal = d === 6 && showRehearsals;
                  const isClickable = hasLesson || hasRehearsal;
                  return (
                    <div
                      key={i}
                      onClick={() => isClickable && handleDayClick(d, hasLesson, hasRehearsal)}
                      className={`p-1 md:p-2 text-center border-b border-r border-gray-100 min-h-[40px] md:min-h-[60px] ${isClickable ? 'cursor-pointer hover:bg-gray-50' : ''}`}
                    >
                      <span className={hasLesson || hasRehearsal ? 'font-bold' : ''}>{d}</span>
                      {hasLesson && (
                        <div className="mt-1 text-xs bg-blue-500 text-white rounded px-0.5 md:px-1 py-0.5 truncate hidden sm:block">4:00</div>
                      )}
                      {hasLesson && (
                        <div className="w-2 h-2 bg-blue-500 rounded-full mx-auto mt-1 sm:hidden"></div>
                      )}
                      {hasRehearsal && (
                        <div className="mt-1 text-xs bg-orange-500 text-white rounded px-0.5 md:px-1 py-0.5 truncate hidden sm:block">5:00</div>
                      )}
                      {hasRehearsal && (
                        <div className="w-2 h-2 bg-orange-500 rounded-full mx-auto mt-1 sm:hidden"></div>
                      )}
                    </div>
                  );
                })}
                {[9, 10, 11, 12, 13, 14, 15].map((d, i) => {
                  const hasLesson = d === 10;
                  const hasRehearsal = d === 13 && showRehearsals;
                  const isClickable = hasLesson || hasRehearsal;
                  return (
                    <div
                      key={i}
                      onClick={() => isClickable && handleDayClick(d, hasLesson, hasRehearsal)}
                      className={`p-1 md:p-2 text-center border-b border-r border-gray-100 min-h-[40px] md:min-h-[60px] ${isClickable ? 'cursor-pointer hover:bg-gray-50' : ''}`}
                    >
                      <span className={hasLesson || hasRehearsal ? 'font-bold' : ''}>{d}</span>
                      {hasLesson && (
                        <div className="mt-1 text-xs bg-blue-500 text-white rounded px-0.5 md:px-1 py-0.5 truncate hidden sm:block">4:00</div>
                      )}
                      {hasLesson && (
                        <div className="w-2 h-2 bg-blue-500 rounded-full mx-auto mt-1 sm:hidden"></div>
                      )}
                      {hasRehearsal && (
                        <div className="mt-1 text-xs bg-orange-500 text-white rounded px-0.5 md:px-1 py-0.5 truncate hidden sm:block">5:00</div>
                      )}
                      {hasRehearsal && (
                        <div className="w-2 h-2 bg-orange-500 rounded-full mx-auto mt-1 sm:hidden"></div>
                      )}
                    </div>
                  );
                })}
                {[16, 17, 18, 19, 20, 21, 22].map((d, i) => (
                  <div key={i} className="p-1 md:p-2 text-center border-b border-r border-gray-100 min-h-[40px] md:min-h-[60px]">{d}</div>
                ))}
              </div>
            </div>
            <div className="flex gap-4 mt-3 text-xs text-gray-500">
              <span className="flex items-center gap-1"><span className="w-2 h-2 bg-blue-500 rounded-full"></span> Lesson</span>
              {showRehearsals && <span className="flex items-center gap-1"><span className="w-2 h-2 bg-orange-500 rounded-full"></span> Rehearsal</span>}
            </div>
          </div>
        );
      };

      const AssignmentList = ({ assignments, showStudent = false }) => (
        <div className="space-y-2">
          {assignments.map((item, i) => (
            <div
              key={i}
              onClick={() => setActiveScreen('assignment-detail')}
              className="flex items-center justify-between p-4 border border-gray-200 rounded-xl cursor-pointer hover:border-gray-300 hover:shadow-sm transition-all"
            >
              <div className="flex items-center gap-3">
                {showStudent && <div className="w-10 h-10 rounded-full bg-gray-200" />}
                <div>
                  {showStudent && <div className="font-medium text-gray-900">{item.student}</div>}
                  <div className={showStudent ? "text-sm text-gray-500" : "font-medium text-gray-900"}>{item.task}</div>
                  {!showStudent && <div className="text-sm text-gray-500">{item.due}</div>}
                </div>
              </div>
              <div className="flex items-center gap-3">
                <span className={`text-xs px-3 py-1 rounded-full font-medium ${
                  item.status === 'Approved' ? 'bg-green-100 text-green-700' :
                  item.status === 'Redo' ? 'bg-amber-100 text-amber-700' :
                  item.status === 'Needs Review' ? 'bg-blue-100 text-blue-700' :
                  'bg-blue-100 text-blue-700'
                }`}>{item.status}</span>
                {item.hasVideo && <span>🎥</span>}
                {showStudent && <span className="text-xs text-gray-400">Due {item.due}</span>}
                <span className="text-gray-300">→</span>
              </div>
            </div>
          ))}
        </div>
      );

      // Mobile Header
      const MobileHeader = () => (
        <div className="md:hidden flex items-center justify-between p-4 bg-white border-b border-gray-200">
          <button onClick={() => setMenuOpen(true)} className="text-2xl text-gray-700">☰</button>
          <div className="text-lg font-bold text-gray-900">🎵 Music School</div>
          <div className="w-8" />
        </div>
      );

      return (
        <div className="h-screen bg-white flex flex-col">
          {selectedEvent && <EventSheet event={selectedEvent} onClose={() => setSelectedEvent(null)} />}
          <MobileHeader />
          <div className="flex flex-1 min-h-0">
            <Sidebar />
            <MobileMenu />

              <div className="flex-1 p-4 md:p-6 overflow-auto relative">

                {/* ============ TEACHER DASHBOARD ============ */}
                {activeScreen === 'teacher-dashboard' && (
                  <div className="relative h-full">
                    <div className="flex justify-between items-start mb-6">
                      <div className="flex items-center gap-4">
                        <div className="w-14 h-14 rounded-full bg-gray-200" />
                        <div>
                          <h1 className="text-xl font-bold text-gray-900">Greg</h1>
                          <div className="text-gray-500">24 students</div>
                          <div className="flex items-center gap-2 mt-2">
                            <span className="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded-lg">🥁 Drums</span>
                            <span className="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded-lg">🎸 Bass</span>
                          </div>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        <button onClick={() => setActiveScreen('create-assignment')} className="bg-gray-900 text-white px-4 py-2 rounded-lg font-medium">+ New Assignment</button>
                        <button onClick={() => setActiveScreen('messaging')} className="bg-gray-100 px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-gray-200">
                          💬 Messages
                        </button>
                      </div>
                    </div>

                    <Calendar />

                    <div className="mb-24">
                      <div className="flex items-center justify-between mb-4">
                        <h2 className="font-bold text-gray-900">Assignments</h2>
                        <div className="flex items-center gap-2">
                          <input type="text" placeholder="Search..." className="text-sm border border-gray-200 rounded-lg px-3 py-2 w-32" />
                          <select className="text-sm border border-gray-200 rounded-lg px-3 py-2">
                            <option>All Status</option>
                            <option>Needs Review</option>
                            <option>Approved</option>
                          </select>
                        </div>
                      </div>
                      <AssignmentList
                        showStudent={true}
                        assignments={[
                          { student: 'Henry', task: 'Basic Rock Beat', due: 'Jan 27', status: 'Needs Review' },
                          { student: 'James Park', task: 'Bass Line - Walking', due: 'Jan 25', status: 'Needs Review' },
                          { student: 'Lucas Garcia', task: 'Drum Fill Pattern', due: 'Jan 29', status: 'Needs Review' },
                          { student: 'Henry', task: 'Single Stroke Roll', due: 'Jan 22', status: 'Approved' },
                        ]}
                      />
                    </div>

                  </div>
                )}

                {/* ============ TEACHER PROFILE ============ */}
                {activeScreen === 'teacher-profile' && (
                  <div>
                    <button onClick={() => setActiveScreen('teacher-dashboard')} className="text-gray-500 mb-4 hover:text-gray-700">← Back</button>

                    <div className="flex items-center gap-4 mb-6">
                      <div className="w-20 h-20 rounded-full bg-gray-200" />
                      <div className="flex-1">
                        <h1 className="text-xl font-bold text-gray-900">Greg</h1>
                        <div className="text-gray-500">Teaching since 2015 • 24 students</div>
                        <div className="flex items-center gap-2 mt-2">
                          <span className="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded-lg">🥁 Drums</span>
                          <span className="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded-lg">🎸 Bass</span>
                        </div>
                      </div>
                      <button className="bg-gray-100 px-4 py-2 rounded-lg">✏️ Edit Profile</button>
                    </div>

                    <div className="mb-6">
                      <h3 className="font-bold text-gray-900 mb-2">About</h3>
                      <div className="bg-gray-50 rounded-xl p-4 text-gray-600">
                        I've been teaching drums and bass for over 10 years. I love helping students find their groove and build a solid rhythmic foundation.
                      </div>
                    </div>

                    <div className="mb-6">
                      <h3 className="font-bold text-gray-900 mb-2">Favorites</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <div className="bg-gray-50 rounded-xl p-3">
                          <div className="text-xs text-gray-500 mb-2">Bands</div>
                          <div className="text-sm font-medium">Bill Evans Trio</div>
                          <div className="text-sm font-medium">Hiromi</div>
                        </div>
