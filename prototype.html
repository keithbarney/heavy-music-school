<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo - Music School</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: {
              50: '#FAFAF8',
              100: '#F5F3EE',
              200: '#E8E5DC',
              300: '#D4D0C4',
            },
            sand: {
              100: '#E8E4D9',
              200: '#D9D4C5',
              300: '#C4BEA9',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      background: #F5F3EE;
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .label-caps {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #8B8680;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Generate initials avatar
    const getInitials = (name) => {
      return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    };

    // Avatar colors
    const avatarColors = [
      'bg-amber-100 text-amber-700',
      'bg-emerald-100 text-emerald-700',
      'bg-blue-100 text-blue-700',
      'bg-purple-100 text-purple-700',
      'bg-rose-100 text-rose-700',
      'bg-cyan-100 text-cyan-700',
    ];

    const getAvatarColor = (name) => {
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return avatarColors[Math.abs(hash) % avatarColors.length];
    };

    // Avatar component with initials
    const Avatar = ({ name, size = 'md' }) => {
      const sizeClasses = {
        sm: 'w-8 h-8 text-xs',
        md: 'w-10 h-10 text-sm',
        lg: 'w-12 h-12 text-base',
        xl: 'w-16 h-16 text-lg',
      };
      return (
        <div className={`${sizeClasses[size]} ${getAvatarColor(name)} rounded-full flex items-center justify-center font-semibold`}>
          {getInitials(name)}
        </div>
      );
    };

    const MusicSchoolPrototype = () => {
      const [activeScreen, setActiveScreen] = useState('admin-dashboard');
      const [userType, setUserType] = useState('admin');
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [selectedStudents, setSelectedStudents] = useState(['Henry Barney']);
      const [showUserMenu, setShowUserMenu] = useState(false);

      const switchTo = (screen, type) => {
        setActiveScreen(screen);
        setUserType(type);
      };

      const navConfig = {
        teacher: [
          { label: 'Dashboard', icon: 'home', screen: 'teacher-dashboard' },
          { label: 'Students', icon: 'users', screen: 'students-roster' },
          { label: 'Bands', icon: 'music', screen: 'band-management' },
          { label: 'Calendar', icon: 'calendar', screen: 'schedule' },
        ],
        student: [
          { label: 'Dashboard', icon: 'home', screen: 'student-dashboard' },
          { label: 'Schedule', icon: 'calendar', screen: 'book-lesson' },
          { label: 'Bands', icon: 'music', screen: 'band-management' },
        ],
        parent: [
          { label: 'Dashboard', icon: 'home', screen: 'parent-dashboard' },
          { label: 'Schedule', icon: 'calendar', screen: 'book-lesson' },
        ],
        admin: [
          { label: 'Dashboard', icon: 'home', screen: 'admin-dashboard' },
          { label: 'Students', icon: 'users', screen: 'students-roster' },
          { label: 'Roster & Teachers', icon: 'clipboard', screen: 'teachers-roster' },
          { label: 'Bands', icon: 'music', screen: 'band-management' },
          { label: 'Calendar', icon: 'calendar', screen: 'schedule' },
        ],
      };

      const userNames = {
        teacher: { name: 'Greg', role: 'Teacher' },
        student: { name: 'Henry', role: 'Student' },
        parent: { name: 'Keith Barney', role: 'Parent' },
        admin: { name: 'Sarah', role: 'Admin' },
      };

      // Icon components - minimal filled style
      const Icon = ({ name, className = '' }) => {
        const icons = {
          home: (
            <svg className={`w-5 h-5 ${className}`} fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z" />
            </svg>
          ),
          users: (
            <svg className={`w-5 h-5 ${className}`} fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z" />
            </svg>
          ),
          clipboard: (
            <svg className={`w-5 h-5 ${className}`} fill="currentColor" viewBox="0 0 24 24">
              <path d="M19 3h-4.2c-.4-1.2-1.5-2-2.8-2s-2.4.8-2.8 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.6 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1z" />
            </svg>
          ),
          music: (
            <svg className={`w-5 h-5 ${className}`} fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 3v10.6c-.6-.4-1.3-.6-2-.6-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4V7h4V3h-6z" />
            </svg>
          ),
          calendar: (
            <svg className={`w-5 h-5 ${className}`} fill="currentColor" viewBox="0 0 24 24">
              <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z" />
            </svg>
          ),
          settings: (
            <svg className={`w-5 h-5 ${className}`} fill="currentColor" viewBox="0 0 24 24">
              <path d="M19.4 13c0-.3.1-.6.1-1s0-.7-.1-1l2.1-1.6c.2-.1.2-.4.1-.6l-2-3.5c-.1-.2-.4-.3-.6-.2l-2.5 1c-.5-.4-1.1-.7-1.7-1l-.4-2.6c0-.3-.3-.5-.5-.5h-4c-.3 0-.5.2-.5.5l-.4 2.6c-.6.2-1.2.6-1.7 1l-2.5-1c-.2-.1-.5 0-.6.2l-2 3.5c-.1.2-.1.5.1.6L4.6 11c0 .3-.1.6-.1 1s0 .7.1 1l-2.1 1.6c-.2.1-.2.4-.1.6l2 3.5c.1.2.4.3.6.2l2.5-1c.5.4 1.1.7 1.7 1l.4 2.6c0 .3.3.5.5.5h4c.3 0 .5-.2.5-.5l.4-2.6c.6-.2 1.2-.6 1.7-1l2.5 1c.2.1.5 0 .6-.2l2-3.5c.1-.2.1-.5-.1-.6L19.4 13zM12 15.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5z" />
            </svg>
          ),
          search: (
            <svg className={`w-5 h-5 ${className}`} fill="currentColor" viewBox="0 0 24 24">
              <path d="M15.5 14h-.8l-.3-.3c1-1.1 1.6-2.6 1.6-4.2C16 5.9 13.1 3 9.5 3S3 5.9 3 9.5 5.9 16 9.5 16c1.6 0 3.1-.6 4.2-1.6l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0C7 14 5 12 5 9.5S7 5 9.5 5 14 7 14 9.5 12 14 9.5 14z" />
            </svg>
          ),
          bell: (
            <svg className={`w-5 h-5 ${className}`} fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.1-1.6-5.6-4.5-6.3V4c0-.8-.7-1.5-1.5-1.5s-1.5.7-1.5 1.5v.7C7.6 5.4 6 7.9 6 11v5l-2 2v1h16v-1l-2-2z" />
            </svg>
          ),
          plus: (
            <svg className={`w-5 h-5 ${className}`} fill="currentColor" viewBox="0 0 24 24">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>
          ),
        };
        return icons[name] || null;
      };

      const Sidebar = () => {
        const items = navConfig[userType] || navConfig.admin;

        return (
          <div className="w-56 bg-cream-100 border-r border-cream-200 p-4 flex flex-col min-h-screen">
            <div className="text-xl font-bold text-gray-900 mb-8 px-2">TEMPO</div>

            <nav className="space-y-1 flex-1">
              {items.map((item) => (
                <div
                  key={item.label}
                  onClick={() => setActiveScreen(item.screen)}
                  className={`px-3 py-2.5 rounded-lg cursor-pointer flex items-center gap-3 text-sm font-medium transition-colors ${
                    activeScreen === item.screen
                      ? 'bg-gray-900 text-white'
                      : 'text-gray-600 hover:bg-cream-200'
                  }`}
                >
                  <Icon name={item.icon} />
                  {item.label}
                </div>
              ))}
            </nav>

            {/* User Switcher */}
            <div className="pt-4 border-t border-cream-200 mt-4">
              <div className="label-caps mb-2 px-2">Switch view</div>
              <div className="flex gap-1 flex-wrap">
                {['teacher', 'student', 'parent', 'admin'].map(type => (
                  <button
                    key={type}
                    onClick={() => switchTo(
                      type === 'teacher' ? 'teacher-dashboard' :
                      type === 'student' ? 'student-dashboard' :
                      type === 'parent' ? 'parent-dashboard' : 'admin-dashboard',
                      type
                    )}
                    className={`px-2 py-1 rounded text-xs font-medium transition-colors ${
                      userType === type
                        ? 'bg-gray-900 text-white'
                        : 'bg-cream-200 text-gray-600 hover:bg-cream-300'
                    }`}
                  >
                    {type.charAt(0).toUpperCase() + type.slice(1)}
                  </button>
                ))}
              </div>
            </div>

            {/* Admin Settings at bottom */}
            {userType === 'admin' && (
              <div className="pt-4 mt-4">
                <div
                  className="px-3 py-2.5 rounded-lg cursor-pointer flex items-center gap-3 text-sm font-medium text-gray-600 hover:bg-cream-200"
                >
                  <Icon name="settings" />
                  Admin Settings
                </div>
              </div>
            )}
          </div>
        );
      };

      // Stat Card component
      const StatCard = ({ label, value, subtitle, alert }) => (
        <div className="bg-white rounded-2xl p-5">
          <div className="label-caps mb-2">{label}</div>
          <div className="text-4xl font-bold text-gray-900 mb-1">{value}</div>
          <div className={`text-sm ${alert ? 'text-orange-600 font-medium' : 'text-gray-500'}`}>
            {subtitle}
          </div>
        </div>
      );

      // Status Badge component
      const StatusBadge = ({ status }) => {
        const styles = {
          Active: 'bg-emerald-100 text-emerald-700',
          Pending: 'bg-orange-100 text-orange-600',
          Submitted: 'bg-amber-100 text-amber-700',
          Approved: 'bg-emerald-100 text-emerald-700',
          Redo: 'bg-amber-100 text-amber-700',
        };
        return (
          <span className={`text-xs px-3 py-1 rounded-full font-medium ${styles[status] || 'bg-gray-100 text-gray-600'}`}>
            {status}
          </span>
        );
      };

      // Schedule Item component
      const ScheduleItem = ({ time, period, title, subtitle }) => (
        <div className="flex gap-4 p-3 bg-cream-100 rounded-xl">
          <div className="text-right min-w-[36px]">
            <div className="text-lg font-bold text-gray-900">{time}</div>
            <div className="text-xs text-gray-500">{period}</div>
          </div>
          <div className="flex-1">
            <div className="font-semibold text-gray-900">{title}</div>
            <div className="text-sm text-gray-500">{subtitle}</div>
          </div>
        </div>
      );

      // Task Item component
      const TaskItem = ({ label, count }) => (
        <label className="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" className="w-4 h-4 rounded border-gray-300" />
          <span className="text-sm text-gray-700">{label}{count ? ` (${count})` : ''}</span>
        </label>
      );

      return (
        <div className="min-h-screen bg-cream-100 flex">
          <Sidebar />

          <div className="flex-1 flex flex-col">
            {/* Header */}
            <div className="h-16 bg-cream-100 flex items-center justify-between px-8">
              <div>
                <h1 className="text-2xl font-bold text-gray-900">
                  Good morning, {userNames[userType].name}
                </h1>
                <div className="text-gray-500 text-sm">
                  {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
                </div>
              </div>

              <div className="flex items-center gap-3">
                <button className="w-10 h-10 rounded-full bg-gray-900 text-white flex items-center justify-center">
                  <Icon name="search" />
                </button>
                <button className="w-10 h-10 rounded-full bg-gray-900 text-white flex items-center justify-center">
                  <Icon name="bell" />
                </button>
                <button className="bg-gray-900 text-white px-4 py-2.5 rounded-full font-medium text-sm flex items-center gap-2">
                  <Icon name="plus" className="w-4 h-4" />
                  New Enrollment
                </button>
              </div>
            </div>

            <div className="flex-1 p-8 overflow-auto">

            {/* ============ ADMIN DASHBOARD ============ */}
            {activeScreen === 'admin-dashboard' && (
              <div className="flex gap-6">
                {/* Main Content */}
                <div className="flex-1">
                  {/* Stats Row */}
                  <div className="grid grid-cols-4 gap-4 mb-6">
                    <StatCard label="Total Students" value="482" subtitle="+12 this month" />
                    <StatCard label="Active Teachers" value="34" subtitle="Full Capacity" />
                    <StatCard label="Classes Today" value="56" subtitle="12 Rooms Active" />
                    <StatCard label="Pending Payments" value="8" subtitle="Action needed" alert />
                  </div>

                  {/* Student Roster */}
                  <div className="bg-white rounded-2xl p-6 mb-6">
                    <div className="flex items-center justify-between mb-4">
                      <div>
                        <div className="label-caps mb-1">Recent Activity</div>
                        <h2 className="text-xl font-bold text-gray-900">Student Roster</h2>
                      </div>
                      <button className="px-4 py-2 bg-cream-100 rounded-lg text-sm font-medium text-gray-700 hover:bg-cream-200">
                        View All
                      </button>
                    </div>

                    <table className="w-full">
                      <thead>
                        <tr className="text-left">
                          <th className="pb-3 label-caps font-medium">Student Name</th>
                          <th className="pb-3 label-caps font-medium">Instrument</th>
                          <th className="pb-3 label-caps font-medium">Level</th>
                          <th className="pb-3 label-caps font-medium">Status</th>
                          <th className="pb-3 label-caps font-medium">Next Lesson</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-cream-200">
                        {[
                          { name: 'Julian Marsh', instrument: 'Piano', level: 'Grade 5', status: 'Active', next: 'Today, 4:00 PM' },
                          { name: 'Ana Lewis', instrument: 'Violin', level: 'Grade 3', status: 'Active', next: 'Tomorrow, 10:00 AM' },
                          { name: 'Ravi Kumar', instrument: 'Guitar', level: 'Beginner', status: 'Pending', next: 'Nov 01, 2:30 PM' },
                          { name: 'Tara Smith', instrument: 'Cello', level: 'Advanced', status: 'Active', next: 'Nov 01, 3:30 PM' },
                        ].map((student, i) => (
                          <tr key={i} className="hover:bg-cream-50 cursor-pointer">
                            <td className="py-4">
                              <div className="flex items-center gap-3">
                                <Avatar name={student.name} />
                                <span className="font-medium text-gray-900">{student.name}</span>
                              </div>
                            </td>
                            <td className="py-4 text-gray-600">{student.instrument}</td>
                            <td className="py-4 text-gray-600">{student.level}</td>
                            <td className="py-4"><StatusBadge status={student.status} /></td>
                            <td className="py-4 text-gray-600">{student.next}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {/* Active Bands */}
                  <div>
                    <div className="label-caps mb-1">Programs</div>
                    <h2 className="text-xl font-bold text-gray-900 mb-4">Active Bands</h2>
                    <div className="grid grid-cols-2 gap-4">
                      {[
                        { name: 'Junior Jazz Ensemble', members: 12, room: 'Room 3B' },
                        { name: 'Chamber Strings', members: 8, room: 'Auditorium' },
                      ].map((band, i) => (
                        <div
                          key={i}
                          className="bg-sand-100 rounded-2xl p-6 h-48 flex flex-col justify-end cursor-pointer hover:bg-sand-200 transition-colors relative overflow-hidden"
                          onClick={() => setActiveScreen('band-profile')}
                        >
                          <div className="absolute top-4 right-4 text-sand-300 text-2xl">♪</div>
                          <h3 className="font-bold text-gray-900">{band.name}</h3>
                          <div className="text-sm text-gray-600">{band.members} Members • {band.room}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Right Sidebar */}
                <div className="w-72 space-y-6">
                  {/* Schedule */}
                  <div className="bg-white rounded-2xl p-5">
                    <div className="flex items-center justify-between mb-4">
                      <div>
                        <div className="label-caps">Schedule</div>
                        <h3 className="font-bold text-gray-900">Today</h3>
                      </div>
                      <button className="w-8 h-8 rounded-full bg-cream-100 flex items-center justify-center text-gray-600 hover:bg-cream-200">
                        <Icon name="plus" className="w-4 h-4" />
                      </button>
                    </div>
                    <div className="space-y-3">
                      <ScheduleItem time="09" period="AM" title="Intro to Theory" subtitle="Room 101 • Group A" />
                      <ScheduleItem time="10" period="AM" title="Piano Masterclass" subtitle="Auditorium • Prof. Chen" />
                      <ScheduleItem time="12" period="PM" title="Staff Lunch" subtitle="Cafeteria" />
                      <ScheduleItem time="02" period="PM" title="Julian Marsh" subtitle="Private Lesson • Piano" />
                      <ScheduleItem time="03" period="PM" title="Brass Sectionals" subtitle="Room 4B • Band A" />
                    </div>
                  </div>

                  {/* Tasks */}
                  <div className="bg-white rounded-2xl p-5">
                    <div className="label-caps mb-3">Tasks</div>
                    <div className="space-y-3">
                      <TaskItem label="Approve schedules" />
                      <TaskItem label="Review applications" count={3} />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ============ TEACHER DASHBOARD ============ */}
            {activeScreen === 'teacher-dashboard' && (
              <div className="flex gap-6">
                <div className="flex-1">
                  {/* Stats Row */}
                  <div className="grid grid-cols-4 gap-4 mb-6">
                    <StatCard label="My Students" value="24" subtitle="2 new this month" />
                    <StatCard label="Lessons Today" value="6" subtitle="Next at 2:00 PM" />
                    <StatCard label="Assignments" value="12" subtitle="3 need review" alert />
                    <StatCard label="Bands" value="3" subtitle="Rehearsal Thu" />
                  </div>

                  {/* Assignments to Review */}
                  <div className="bg-white rounded-2xl p-6 mb-6">
                    <div className="flex items-center justify-between mb-4">
                      <div>
                        <div className="label-caps mb-1">Pending Review</div>
                        <h2 className="text-xl font-bold text-gray-900">Student Submissions</h2>
                      </div>
                      <button
                        onClick={() => setActiveScreen('create-assignment')}
                        className="px-4 py-2 bg-gray-900 rounded-lg text-sm font-medium text-white"
                      >
                        + New Assignment
                      </button>
                    </div>

                    <table className="w-full">
                      <thead>
                        <tr className="text-left">
                          <th className="pb-3 label-caps font-medium">Student</th>
                          <th className="pb-3 label-caps font-medium">Assignment</th>
                          <th className="pb-3 label-caps font-medium">Submitted</th>
                          <th className="pb-3 label-caps font-medium">Status</th>
                          <th className="pb-3 label-caps font-medium"></th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-cream-200">
                        {[
                          { name: 'Henry Barney', task: 'Basic Rock Beat', submitted: 'Today', status: 'Submitted' },
                          { name: 'James Park', task: 'Bass Line - Walking', submitted: 'Yesterday', status: 'Submitted' },
                          { name: 'Lucas Garcia', task: 'Drum Fill Pattern', submitted: '2 days ago', status: 'Submitted' },
                          { name: 'Henry Barney', task: 'Single Stroke Roll', submitted: 'Jan 22', status: 'Approved' },
                        ].map((item, i) => (
                          <tr
                            key={i}
                            className="hover:bg-cream-50 cursor-pointer"
                            onClick={() => setActiveScreen('assignment-detail')}
                          >
                            <td className="py-4">
                              <div className="flex items-center gap-3">
                                <Avatar name={item.name} />
                                <span className="font-medium text-gray-900">{item.name}</span>
                              </div>
                            </td>
                            <td className="py-4 text-gray-600">{item.task}</td>
                            <td className="py-4 text-gray-500 text-sm">{item.submitted}</td>
                            <td className="py-4"><StatusBadge status={item.status} /></td>
                            <td className="py-4 text-gray-400">→</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Right Sidebar */}
                <div className="w-72 space-y-6">
                  <div className="bg-white rounded-2xl p-5">
                    <div className="flex items-center justify-between mb-4">
                      <div>
                        <div className="label-caps">Schedule</div>
                        <h3 className="font-bold text-gray-900">Today</h3>
                      </div>
                    </div>
                    <div className="space-y-3">
                      <ScheduleItem time="02" period="PM" title="Henry Barney" subtitle="Drums • Studio A" />
                      <ScheduleItem time="03" period="PM" title="James Park" subtitle="Bass • Studio A" />
                      <ScheduleItem time="04" period="PM" title="Lucas Garcia" subtitle="Drums • Studio B" />
                      <ScheduleItem time="05" period="PM" title="Band Rehearsal" subtitle="Jam 99 • Main Hall" />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ============ STUDENT DASHBOARD ============ */}
            {activeScreen === 'student-dashboard' && (
              <div className="flex gap-6">

                          <div>
                            <div className="font-medium text-gray-900">{slot.date}</div>
                            <div className="text-sm text-gray-500">{slot.time} • with {slot.teacher}</div>
                          </div>
                          <button className="px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium">Book</button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="w-72">
                  <div className="bg-white rounded-2xl p-5">
                    <div className="label-caps mb-3">Your Upcoming Lessons</div>
                    <div className="space-y-3">
                      <ScheduleItem time="Mon" period="2PM" title="Drums Lesson" subtitle="with Greg • Studio A" />
                      <ScheduleItem time="Thu" period="5PM" title="Band Rehearsal" subtitle="Jam 99 • Main Hall" />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ============ CREATE ASSIGNMENT ============ */}
            {activeScreen === 'create-assignment' && (
              <div className="max-w-2xl">
                <button onClick={() => setActiveScreen('teacher-dashboard')} className="text-gray-500 mb-4 hover:text-gray-700 text-sm">← Back</button>

                <div className="bg-white rounded-2xl p-6">
                  <h2 className="text-xl font-bold text-gray-900 mb-6">Create Assignment</h2>

                  <div className="space-y-5">
                    <div>
                      <div className="label-caps mb-2">Select Students</div>
                      <div className="space-y-2">
                        {['Henry Barney', 'James Park', 'Lucas Garcia', 'Sophie Chen'].map((name) => (
                          <label key={name} className="flex items-center gap-3 p-3 bg-cream-50 rounded-xl cursor-pointer hover:bg-cream-100">
                            <input
                              type="checkbox"
                              checked={selectedStudents.includes(name)}
                              onChange={() => {
                                if (selectedStudents.includes(name)) {
                                  setSelectedStudents(selectedStudents.filter(s => s !== name));
                                } else {
                                  setSelectedStudents([...selectedStudents, name]);
                                }
                              }}
                              className="w-4 h-4 rounded"
                            />
                            <Avatar name={name} size="sm" />
                            <span className="font-medium text-gray-900">{name}</span>
                          </label>
                        ))}
                      </div>
                    </div>

                    <div>
                      <div className="label-caps mb-2">Title</div>
                      <input
                        type="text"
                        placeholder="e.g., Scales - G Major"
                        className="w-full px-4 py-3 bg-cream-50 rounded-xl border-0 focus:ring-2 focus:ring-gray-900"
                      />
                    </div>

                    <div>
                      <div className="label-caps mb-2">Instructions</div>
                      <textarea
                        rows={3}
                        placeholder="What should the student practice?"
                        className="w-full px-4 py-3 bg-cream-50 rounded-xl border-0 focus:ring-2 focus:ring-gray-900"
                      />
                    </div>

                    <div>
                      <div className="label-caps mb-2">Add Link</div>
                      <div className="flex gap-2">
                        <input
                          type="text"
                          placeholder="Paste YouTube or other link"
                          className="flex-1 px-4 py-3 bg-cream-50 rounded-xl border-0 focus:ring-2 focus:ring-gray-900"
                        />
                        <button className="px-4 py-3 bg-gray-900 text-white rounded-xl font-medium">Add</button>
                      </div>
                    </div>

                    <div>
                      <div className="label-caps mb-2">Due Date</div>
                      <div className="flex gap-2">
                        <button className="flex-1 py-3 bg-gray-900 text-white rounded-xl font-medium">Next Lesson</button>
                        <button className="flex-1 py-3 bg-cream-100 text-gray-700 rounded-xl font-medium hover:bg-cream-200">Pick Date</button>
                      </div>
                    </div>

                    <button
                      onClick={() => setActiveScreen('teacher-dashboard')}
                      className="w-full py-4 bg-gray-900 text-white rounded-xl font-medium mt-4"
                    >
                      Create Assignment
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ============ ASSIGNMENT DETAIL ============ */}
            {activeScreen === 'assignment-detail' && (
              <div className="flex gap-6">
                <div className="flex-1 max-w-2xl">
                  <button
                    onClick={() => setActiveScreen(
                      userType === 'teacher' ? 'teacher-dashboard' :
                      userType === 'parent' ? 'parent-dashboard' : 'student-dashboard'
                    )}
                    className="text-gray-500 mb-4 hover:text-gray-700 text-sm"
                  >← Back</button>

                  <div className="bg-white rounded-2xl p-6">
                    <div className="flex items-center justify-between mb-6">
                      <div>
                        <h2 className="text-xl font-bold text-gray-900">Basic Rock Beat</h2>
                        <div className="text-gray-500">From Greg • Due Jan 28</div>
                      </div>
                      <StatusBadge status="Pending" />
                    </div>

                    <div className="mb-6">
                      <div className="label-caps mb-2">Instructions</div>
                      <p className="text-gray-600 bg-cream-50 rounded-xl p-4">
                        Practice the basic rock beat with kick on 1 and 3, snare on 2 and 4, and steady hi-hat 8ths. Focus on keeping a steady tempo. Record yourself playing at 80 BPM minimum.
                      </p>
                    </div>

                    <div className="mb-6">
                      <div className="label-caps mb-2">Resources</div>
                      <a href="#" className="flex items-center gap-4 p-4 bg-cream-50 rounded-xl hover:bg-cream-100">
                        <div className="w-16 h-12 bg-red-100 rounded-lg flex items-center justify-center text-red-600 text-xl">▶️</div>
                        <div className="flex-1">
                          <div className="font-medium text-gray-900">Basic Rock Beat Tutorial</div>
                          <div className="text-sm text-gray-500">youtube.com • 5:15</div>
                        </div>
                        <span className="text-gray-400">↗</span>
                      </a>
                    </div>

                    {userType === 'student' && (
                      <button
                        onClick={() => setActiveScreen('submit-assignment')}
                        className="w-full py-4 bg-gray-900 text-white rounded-xl font-medium"
                      >
                        Submit Practice
                      </button>
                    )}

                    {userType === 'teacher' && (
                      <div className="flex gap-3">
                        <button className="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-medium">Approve</button>
                        <button className="flex-1 py-4 bg-amber-500 text-white rounded-xl font-medium">Request Redo</button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* ============ SUBMIT ASSIGNMENT ============ */}
            {activeScreen === 'submit-assignment' && (
              <div className="max-w-2xl">
                <button onClick={() => setActiveScreen('assignment-detail')} className="text-gray-500 mb-4 hover:text-gray-700 text-sm">← Back</button>

                <div className="bg-white rounded-2xl p-6">
                  <h2 className="text-xl font-bold text-gray-900 mb-2">Submit Work</h2>
                  <div className="text-gray-500 mb-6">Basic Rock Beat</div>

                  <div className="space-y-5">
                    <div>
                      <div className="label-caps mb-2">Add Link (optional)</div>
                      <div className="flex gap-2">
                        <input
                          type="text"
                          placeholder="Paste YouTube or other link"
                          className="flex-1 px-4 py-3 bg-cream-50 rounded-xl border-0 focus:ring-2 focus:ring-gray-900"
                        />
                        <button className="px-4 py-3 bg-gray-900 text-white rounded-xl font-medium">Add</button>
                      </div>
                    </div>

                    <div>
                      <div className="label-caps mb-2">Upload File (optional)</div>
                      <button className="w-full py-8 border-2 border-dashed border-cream-300 rounded-xl text-gray-500 hover:bg-cream-50">
                        📁 Upload recording or file
                      </button>
                    </div>

                    <div>
                      <div className="label-caps mb-2">Notes for Teacher (optional)</div>
                      <textarea
                        rows={3}
                        placeholder="How did practice go? Any questions?"
                        className="w-full px-4 py-3 bg-cream-50 rounded-xl border-0 focus:ring-2 focus:ring-gray-900"
                      />
                    </div>

                    <button
                      onClick={() => setActiveScreen('student-dashboard')}
                      className="w-full py-4 bg-gray-900 text-white rounded-xl font-medium"
                    >
                      Submit
                    </button>
                  </div>
                </div>
              </div>
            )}

            </div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<MusicSchoolPrototype />, document.getElementById('root'));
  </script>
</body>
</html>
